name: Build PptxViewer EXE

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore packages
        run: dotnet restore PptxViewer/PptxViewer.csproj

      - name: Build & Publish single EXE
        run: |
          dotnet publish PptxViewer/PptxViewer.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PptxViewer-win-x64
          path: ./publish/PptxViewer.exe
          retention-days: 30

      # Auto-release on tag push (e.g. git tag v1.0.0 && git push --tags)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./publish/PptxViewer.exe
          generate_release_notes: true
